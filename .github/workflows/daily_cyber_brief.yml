name: Daily Cyber Brief

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-daily-cyber-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore prior state file
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: ${{ runner.os }}-daily-cyber-brief-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-daily-cyber-brief-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure state directory exists
        run: mkdir -p .state

      - name: Run daily cyber brief
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN: 'false'
          LOG_LEVEL: 'INFO'
          MAX_STORIES: '10'
          MIN_RELEVANCE_SCORE: '8'
          STATE_FILE: .state/daily_cyber_brief_state.json
        run: python daily_cyber_brief.py

      - name: Save updated state file
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: ${{ runner.os }}-daily-cyber-brief-state-${{ github.run_id }}
